# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: sifath-mannan-demo.docs.buildwithfern.com
announcement:
  message: "Welcome to the Fern take home docs assignment →"

navbar-links:
  - type: minimal
    text: Learn More
    href: https://buildwithfern.com
  - type: minimal
    text: Plants
    href: /
  - type: filled
    text: About Us
    href: /

title: Plant Store | Documentation

layout:
  searchbar-placement: header
  page-width: full
  tabs-placement: header


settings:
  dark-mode-code: true
  http-snippets: true

tabs:
  home:
    display-name: Home
    skip-slug: true
  api-reference:
    display-name: API Reference
  instructions:
    display-name: Instructions

navigation:
  - tab: home
    layout:
      - page: Home
        path: docs/pages/landingpage.mdx
  - tab: api-reference
    layout:
      - api: API Reference
        playground:
          environments:
            - id: Production
              url: https://api.plantstore.dev/v3
            - id: Sandbox
              url: https://sandbox.api.plantstore.dev/v3
  - tab: instructions
    layout:
      - page: Instructions
        path: docs/pages/instructions.mdx
  
colors:
  accentPrimary:
    dark: "#FFFFFF"
    light: "#000000"
  background:
    light: "#FFFFFF"

page-actions:
  options: 
    chatgpt: true
    claude: true
    cursor: true
  
css: 
  - docs/assets/main.css

typography:
  bodyFont:
    name: clarkson
    paths: 
      - path: docs/assets/fonts/clarkson-300.woff2
        weight: 300
        style: normal
      - path: docs/assets/fonts/clarkson-400.woff2
        weight: 400
        style: normal
      - path: docs/assets/fonts/clarkson-500.woff2
        weight: 600
        style: normal

logo:
  dark: docs/assets/logo-dark.svg
  light: docs/assets/logo-light.svg
  height: 20
  href: /

favicon: docs/assets/favicon.svg
